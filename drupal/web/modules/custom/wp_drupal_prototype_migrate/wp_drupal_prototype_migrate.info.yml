name: WordPress Drupal Prototype Migrate
type: module
description: Prototype migration scaffolding for WordPress to Drupal page, taxonomy, user, media, and redirect import.
package: Custom
core_version_requirement: ^10 || ^11
version: 1.0.0

dependencies:
  - drupal:node
  - drupal:path
  - drupal:field
  - drupal:text
  - drupal:file
  - drupal:taxonomy
  - drupal:user
  - drupal:migrate
  - migrate_plus:migrate_plus
  - migrate_tools:migrate_tools
  - migrate_source_csv:migrate_source_csv
  - redirect:redirect
