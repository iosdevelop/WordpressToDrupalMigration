id: wp_pages
label: WordPress Pages CSV to Drupal Nodes
source:
  plugin: csv
  path: modules/custom/wp_drupal_prototype_migrate/data/wp-pages.csv
  header_row_count: 1
  ids: [slug]
process:
  type: content_type
  title: title
  body/value: content_html
  body/format:
    plugin: default_value
    default_value: basic_html
  field_legacy_url: legacy_url
  field_seo_title: seo_title
  field_seo_description: seo_description
  path/alias:
    plugin: slug_to_alias
    source: slug
  path/pathauto:
    plugin: default_value
    default_value: 0
  status:
    plugin: default_value
    default_value: 1
  uid:
    plugin: migration_lookup
    migration: wp_users
    source: wp_author_login
    no_stub: true
  field_wp_section:
    plugin: migration_lookup
    migration: wp_taxonomy_terms
    source: wp_category_slug
    no_stub: true
destination:
  plugin: entity:node
  default_bundle: wp_migrated_page
migration_dependencies:
  required:
    - wp_taxonomy_terms
    - wp_users
  optional:
    - wp_media
