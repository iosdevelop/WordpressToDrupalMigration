id: wp_pages
label: WordPress Pages CSV to Drupal Nodes
source:
  plugin: csv
  path: modules/custom/wp_drupal_prototype_migrate/data/wp-pages.csv
  header_row_count: 1
  ids: [slug]
process:
  type:
    plugin: default_value
    default_value: wp_migrated_page
  title: title
  body/value: content_html
  body/format:
    plugin: default_value
    default_value: basic_html
  field_legacy_url: legacy_url
  field_seo_title: seo_title
  field_seo_description: seo_description
  path/alias:
    plugin: slug_to_alias
    source: slug
  path/pathauto:
    plugin: default_value
    default_value: 0
  status:
    plugin: default_value
    default_value: 1
destination:
  plugin: entity:node
  default_bundle: wp_migrated_page
migration_dependencies:
  required: []
  optional: []
