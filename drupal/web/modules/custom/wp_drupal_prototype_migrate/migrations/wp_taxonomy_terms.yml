id: wp_taxonomy_terms
label: WordPress Categories to Drupal Taxonomy Terms (wp_section)
source:
  plugin: csv
  path: modules/custom/wp_drupal_prototype_migrate/data/wp-categories.csv
  header_row_count: 1
  ids: [slug]
process:
  name: name
  vid:
    plugin: default_value
    default_value: wp_section
  description: description
  weight:
    plugin: default_value
    default_value: 0
destination:
  plugin: entity:taxonomy_term
migration_dependencies:
  required: []
  optional: []
