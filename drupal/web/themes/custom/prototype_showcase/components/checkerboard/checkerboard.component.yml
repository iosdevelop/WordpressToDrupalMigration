$schema: https://git.drupalcode.org/project/drupal/-/raw/11.x/core/assets/schemas/v1/metadata.schema.json
name: Checkerboard Item
description: Editorial checkerboard content item.
props:
  type: object
  required: [heading]
  properties:
    eyebrow:
      type: string
      title: Eyebrow
      examples: ['Two Card Checkerboard']
    heading:
      type: string
      title: Heading
      examples: ['Opportunity after service']
    content:
      type: string
      title: Content
      examples: ['Reusable media and text modules create a strong editorial rhythm.']
