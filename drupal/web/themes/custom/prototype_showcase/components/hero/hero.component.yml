$schema: https://git.drupalcode.org/project/drupal/-/raw/11.x/core/assets/schemas/v1/metadata.schema.json
name: IVMF Hero
description: Production-inspired Canvas hero.
props:
  type: object
  required: [heading]
  properties:
    eyebrow:
      type: string
      title: Eyebrow
      examples: ['Syracuse University · IVMF']
    heading:
      type: string
      title: Heading
      examples: ['Empowering the military-connected community']
    body:
      type: string
      title: Body
      examples: ['Programs, resources, and research for veterans and military families.']
    link_text:
      type: string
      title: Link text
      examples: ['Explore the programs']
    link_url:
      type: string
      format: uri-reference
      title: Link URL
      examples: ['/canvas-layout-demo']
