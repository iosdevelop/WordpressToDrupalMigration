$schema: https://git.drupalcode.org/project/drupal/-/raw/11.x/core/assets/schemas/v1/metadata.schema.json
name: IVMF List Item
description: Flexible teaser item used for news, events, and updates.
props:
  type: object
  properties:
    heading:
      type: string
      title: Heading
    subheading:
      type: string
      title: Subheading
    description:
      type: string
      title: Description
    cta_style:
      type: string
      title: CTA Style
      enum: [button, button-pair, text]
      default: text
    link_url:
      type: string
      format: uri-reference
      title: Link URL
    link_text:
      type: string
      title: Link Text
    accessible_link_text:
      type: string
      title: Accessible Link Text
    second_link_url:
      type: string
      format: uri-reference
      title: Optional Second Link URL
    second_link_text:
      type: string
      title: Optional Second Link Text
    second_accessible_link_text:
      type: string
      title: Optional Second Accessible Link Text
    image:
      $ref: json-schema-definitions://canvas.module/image
      type: object
      title: Image
